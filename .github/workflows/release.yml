name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
          sudo apt-get install -y mingw-w64 nsis

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build -- --target x86_64-pc-windows-gnu --no-bundle

      - name: Rename executable
        run: mv src-tauri/target/x86_64-pc-windows-gnu/release/alarm-trigger.exe src-tauri/target/x86_64-pc-windows-gnu/release/alarm-trigger-standalone.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/x86_64-pc-windows-gnu/release/alarm-trigger-standalone.exe
          body: |
            ## 🚀 alarm-trigger 릴리스

            이 릴리스는 Windows 전용 실행 파일(.exe)로 제공됩니다. 다운로드 후 설치 없이 바로 실행하여 사용할 수 있습니다.

            ### 📌 주요 기능
            - 설정된 시간에 알람을 트리거합니다.
            - 마크다운 기반의 알람 내용을 확인할 수 있습니다.
          draft: false
          prerelease: false
